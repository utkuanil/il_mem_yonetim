name: il_mem_yonetim
description: "İl Milli Eğitim Müdürlüğü Mobil ve Web Yönetim Uygulaması"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  pdf: ^3.10.7
  printing: ^5.12.0
  intl: ^0.19.0
  google_maps_flutter: ^2.6.1
  provider: ^6.1.2
  fl_chart: ^0.68.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  file_selector: ^1.0.3
  open_filex: ^4.4.0
  flutter_pdfview: ^1.3.2
  flutter_riverpod: ^2.5.1


  flutter:
    sdk: flutter

  go_router: ^14.0.0
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  xml: ^6.5.0
  url_launcher: ^6.3.0
  charset: ^2.0.1
  csv: ^6.0.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1
flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/data/tunceli_okullar.json
    - assets/images/app_logo.png
    - assets/data/projects/ulusal_projeler.json
    - assets/data/projects/uluslararasi_projeler.json
    - assets/data/material_komisyonu.json
    - assets/data/dyk_kurslari.json
    - assets/data/tasimali/tasimali_ozel.json
    - assets/data/tasimali/tasimali_orta.json
    - assets/data/tasimali/tasimali_temel.json
    - assets/images/
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf

flutter_native_splash:
  color: "#FFFFFF"   # arka plan rengi (beyaz)
  image: assets/images/app_logo.png

  android: true
  web: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/app_logo.png